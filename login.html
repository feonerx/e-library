<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | MCIU E-Library</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="./index.html" class="brand">
        <span class="brand-mark">MCIU</span>
        <span class="brand-text">
          <strong>MCIU E-Library</strong>
          <span>Michael &amp; Cecilia Ibru University</span>
        </span>
      </a>
      <ul class="nav-links">
        <li><a href="./index.html">Catalog</a></li>
      </ul>
      <div class="nav-actions">
        <a class="btn primary-btn" href="./signup.html">Sign Up</a>
      </div>
    </nav>
  </header>

  <main class="auth-wrap">
    <div class="auth-side">
      <div class="auth-side-inner">
        <span class="brand-mark">MCIU</span>
        <h2>Welcome back to the MCIU E-Library.</h2>
        <p>
          Log in with your email or matric/staff ID to continue borrowing and managing your reading list.
        </p>
      </div>
    </div>

    <div class="auth-form-col">
      <div class="auth-card">
        <h1>Log in</h1>
        <p>Enter your details to access your account.</p>

        <div class="alert error" id="formAlert"></div>

        <form id="loginForm" novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="identifier">Email or Matric / Staff ID</label>
              <input type="text" id="identifier" name="identifier" placeholder="you@mciu.edu.ng" required />
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Your password" required />
            </div>
          </div>

          <div class="form-footer">
            <button type="submit" class="btn primary-btn block">Log In</button>
            <p class="form-alt">Don't have an account? <a href="./signup.html">Sign up</a></p>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="./app.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const alertBox = document.getElementById("formAlert");

    function showAlert(message) {
      alertBox.textContent = message;
      alertBox.className = "alert show error";
    }

    if (MCIU.getCurrentUser()) {
      window.location.href = "./dashboard.html";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertBox.classList.remove("show");

      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value;

      if (!identifier || !password) {
        showAlert("Please enter your email/ID and password.");
        return;
      }

      const submitBtn = form.querySelector("button[type=submit]");
      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in...";

      try {
        await MCIU.login({ identifier, password });
        window.location.href = "./dashboard.html";
      } catch (err) {
        showAlert(err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = "Log In";
      }
    });
  </script>
</body>
</html>
